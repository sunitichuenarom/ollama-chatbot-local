services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: always
    ports:
      - "1311:8080"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - open_webui_data:/app/backend/data
    depends_on:
      - ollama

  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw
    restart: always
    command: ["node", "dist/index.js", "gateway", "--bind", "lan", "--port", "18789", "--allow-unconfigured"]
    environment:
      - LLM_PROVIDER=ollama
      - LLM_OLLAMA_BASE_URL=http://ollama:11434
      - LLM_MODEL=qwen-coder
    ports:
      - "1312:18789"
    volumes:
      - ./openclaw-config:/home/node/.openclaw
    depends_on:
      - ollama

  openclaw-chat:
    build:
      context: ./openclaw-chat
      dockerfile: Dockerfile
    container_name: openclaw-chat
    restart: always
    ports:
      - "1313:3000"
    environment:
      - OPENCLAW_API_URL=http://openclaw:18789/v1/chat/completions
      - OPENCLAW_AUTH_TOKEN=650df9f5ce310e504cb24038120e7d6fa1ad68763aec7e5a
      - OPENCLAW_MODEL=qwen3.5:9b
      - OPENCLAW_MAX_CONTEXT_TOKENS=32768
      - OPENCLAW_MAX_INPUT_TOKENS=20000
      - NEXT_PUBLIC_MAX_INPUT_TOKENS=20000
    depends_on:
      - openclaw

volumes:
  ollama_data:
  open_webui_data: